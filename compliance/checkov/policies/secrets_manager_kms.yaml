metadata:
  id: "CKV2_AWS_9003"
  name: "Ensure Secrets Manager uses a customer managed KMS key"
  category: "SECRETS"
  severity: "CRITICAL"
  guideline: "HIPAA 164.312(a)(2)(iv): encrypt credentials and regulated secrets with customer-controlled keys."
scope:
  provider: aws
definition:
  cond_type: "attribute"
  resource_types:
    - "aws_secretsmanager_secret"
  attribute: "kms_key_id"
  operator: "exists"
