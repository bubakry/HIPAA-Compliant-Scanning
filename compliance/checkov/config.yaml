framework:
  - terraform
compact: true
download-external-modules: false
external-checks-dir:
  - compliance/checkov/policies
quiet: true
skip-path:
  - .terraform
# Documented suppressions. Each entry below is an intentional architectural
# decision, not an oversight. Lines are grouped by the control they relax.
skip-check:
  # ALB access logs only support SSE-S3 (AWS hard constraint). The regulated
  # data bucket still enforces SSE-KMS.
  - CKV_AWS_145
  # S3 access logging on the log/audit buckets would require a second set of
  # log buckets and recurse. The trail, data, and ALB log buckets are already
  # the terminal audit sinks.
  - CKV_AWS_18
  # Cross-region replication doubles storage cost and is out of scope for the
  # single-region baseline. Documented as a future control.
  - CKV_AWS_144
  # Bucket lifecycle rules and event notifications are environment-specific
  # and are wired up at the workload layer, not the baseline.
  - CKV2_AWS_61
  - CKV2_AWS_62
  # S3 ownership is locked to BucketOwnerPreferred, which is equivalent in
  # practice once block-public-acls and restrict-public-buckets are enforced
  # (which they are, via aws_s3_bucket_public_access_block).
  - CKV2_AWS_65
  # Default SG lockdown is enforced at the VPC account level in real
  # environments. Skipping to keep the module self-contained.
  - CKV2_AWS_12
  # ALB WAF is out of scope for the infrastructure baseline — added at the
  # workload layer per deployment.
  - CKV2_AWS_28
  # Secrets Manager automatic rotation requires a bootstrap Lambda and is
  # out of scope for the baseline module. Rotate manually during demo.
  - CKV2_AWS_57
  # GitHub OIDC plan/apply roles require broad permissions to manage arbitrary
  # Terraform-provisioned resources whose ARNs are not known at role creation
  # time. The trust policy (OIDC subject claim + branch restriction) is the
  # real blast-radius control.
  - CKV_AWS_107
  - CKV_AWS_108
  - CKV_AWS_109
  - CKV_AWS_110
  - CKV_AWS_111
  - CKV_AWS_356
  # RDS enhanced monitoring would require an additional IAM role and is out of
  # scope for the baseline. Performance Insights + CloudWatch logs cover the
  # observability path for this demo.
  - CKV_AWS_118
  # CloudTrail SNS topic + subscription is out of scope for the baseline.
  # Log file validation + S3 object-level auditing satisfy the core HIPAA
  # evidence requirement.
  - CKV_AWS_252
