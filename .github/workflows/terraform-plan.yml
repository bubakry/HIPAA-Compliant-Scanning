name: Terraform Plan

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: plan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: "1.14.8"

jobs:
  validate:
    name: Terraform fmt + validate (no backend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate

  detect-secrets:
    name: Detect plan secrets
    runs-on: ubuntu-latest
    outputs:
      have_plan_secrets: ${{ steps.check.outputs.have_plan_secrets }}
    steps:
      - name: Check that plan secrets are configured
        id: check
        env:
          AWS_TERRAFORM_PLAN_ROLE_ARN: ${{ secrets.AWS_TERRAFORM_PLAN_ROLE_ARN }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_LOCK_TABLE: ${{ secrets.TF_STATE_LOCK_TABLE }}
        run: |
          if [ -n "${AWS_TERRAFORM_PLAN_ROLE_ARN}" ] \
             && [ -n "${TF_STATE_BUCKET}" ] \
             && [ -n "${TF_STATE_LOCK_TABLE}" ]; then
            echo "have_plan_secrets=true" >> "${GITHUB_OUTPUT}"
            echo "Plan secrets present; the live plan job will run."
          else
            echo "have_plan_secrets=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::Plan secrets not configured; the live plan job is skipped. The validate job still gates the PR."
          fi

  plan:
    name: Terraform plan (live, with backend)
    needs:
      - validate
      - detect-secrets
    if: needs.detect-secrets.outputs.have_plan_secrets == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885  # v6.1.1
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_TERRAFORM_PLAN_ROLE_ARN }}

      - name: Create backend config
        run: |
          cat <<EOF > backend.hcl
          bucket         = "${{ secrets.TF_STATE_BUCKET }}"
          key            = "terraform/${{ github.event.repository.name }}/terraform.tfstate"
          region         = "${{ env.AWS_REGION }}"
          dynamodb_table = "${{ secrets.TF_STATE_LOCK_TABLE }}"
          encrypt        = true
          EOF

      - name: Terraform init
        run: terraform init -input=false -backend-config=backend.hcl

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          terraform plan \
            -input=false \
            -var="github_repository=${GITHUB_REPOSITORY}" \
            -var="enable_service=false" \
            -out=tfplan

      - name: Render plan
        run: terraform show -no-color tfplan > plan.txt

      - name: Publish plan artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: terraform-plan
          path: plan.txt

      - name: Add plan summary
        run: |
          {
            echo "### Terraform Plan"
            echo
            echo '```text'
            sed -n '1,200p' plan.txt
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
