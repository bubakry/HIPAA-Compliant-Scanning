name: Compliance Scan

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: compliance-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  PYTHON_VERSION: "3.12"
  JAVA_VERSION: "21"
  TERRAFORM_VERSION: "1.14.8"
  CHECKOV_VERSION: "3.2.521"
  SEMGREP_VERSION: "1.159.0"
  TFSEC_VERSION: "1.28.14"
  GITLEAKS_VERSION: "8.30.1"
  DEPENDENCY_CHECK_VERSION: "12.2.1"
  TRIVY_ACTION_VERSION: "0.35.0"
  TRIVY_VERSION: "v0.69.3"

jobs:
  terraform-iac-scan:
    name: Terraform IaC Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Checkov
        run: python -m pip install --upgrade pip "checkov==${CHECKOV_VERSION}"

      - name: Install tfsec
        run: |
          curl -sSfL "https://github.com/aquasecurity/tfsec/releases/download/v${TFSEC_VERSION}/tfsec-linux-amd64" -o /usr/local/bin/tfsec
          chmod +x /usr/local/bin/tfsec

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Checkov HIPAA policies
        run: |
          checkov \
            --config-file compliance/checkov/config.yaml \
            --directory .

      - name: tfsec Terraform scan
        run: |
          tfsec . \
            --config-file compliance/tfsec/tfsec.yml \
            --format sarif \
            --out tfsec.sarif

      - name: Upload tfsec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: tfsec.sarif
          category: tfsec

  source-and-dependency-scan:
    name: Source, Secret, and Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Semgrep
        run: python -m pip install --upgrade pip "semgrep==${SEMGREP_VERSION}"

      - name: Install Gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Cache Dependency-Check database
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check-data
          key: dependency-check-${{ runner.os }}-${{ env.DEPENDENCY_CHECK_VERSION }}-${{ github.run_id }}
          restore-keys: |
            dependency-check-${{ runner.os }}-${{ env.DEPENDENCY_CHECK_VERSION }}-

      - name: Install Dependency-Check
        run: |
          curl -sSfL "https://github.com/dependency-check/DependencyCheck/releases/download/v${DEPENDENCY_CHECK_VERSION}/dependency-check-${DEPENDENCY_CHECK_VERSION}-release.zip" -o dependency-check.zip
          unzip -q dependency-check.zip -d dependency-check

      - name: Gitleaks secret scan
        run: gitleaks git --verbose --redact --config .gitleaks.toml

      - name: Semgrep SAST scan
        run: |
          semgrep scan \
            --config p/python \
            --config compliance/semgrep/hipaa-fastapi.yml \
            --error \
            --sarif \
            --output semgrep.sarif \
            app tests

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Dependency-Check SCA scan
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mkdir -p reports/dependency-check
          EXTRA_ARGS=""
          if [ -n "${NVD_API_KEY}" ]; then
            EXTRA_ARGS="--nvdApiKey ${NVD_API_KEY}"
          fi

          ./dependency-check/dependency-check/bin/dependency-check.sh \
            --data ~/.dependency-check-data \
            --disableOssIndex \
            --disableNodeJS \
            --disableNodeAudit \
            --disableYarnAudit \
            --disablePnpmAudit \
            --disableRetireJS \
            --disableBundleAudit \
            --disableMSBuild \
            --disableAssembly \
            --disableNuspec \
            --disableNugetconf \
            --disableCentral \
            --nvdValidForHours 24 \
            --failOnCVSS 9 \
            --format "HTML" \
            --format "JSON" \
            --out reports/dependency-check \
            --project "${GITHUB_REPOSITORY}" \
            --scan requirements.txt \
            --scan app \
            --suppression compliance/dependency-check/suppressions.xml \
            ${EXTRA_ARGS}

      - name: Upload Dependency-Check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: reports/dependency-check

  container-scan:
    name: Container and Dockerfile Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build application image
        run: docker build --tag local/hipaa-fastapi:${{ github.sha }} .

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: compliance/trivy/trivy.yaml
          format: sarif
          output: trivy-fs.sarif
          version: ${{ env.TRIVY_VERSION }}
          limit-severities-for-sarif: true

      - name: Upload Trivy filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: local/hipaa-fastapi:${{ github.sha }}
          scan-type: image
          trivy-config: compliance/trivy/trivy.yaml
          format: sarif
          output: trivy-image.sarif
          version: ${{ env.TRIVY_VERSION }}
          limit-severities-for-sarif: true

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
